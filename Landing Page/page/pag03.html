<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title> Contato </title>
</head>

<body>
    <div class="container">
        <a href="../index.html">
            <img src="../image/icon_home.png" width="50px" alt="Icone para voltar">
        </a>
        <h1> CONTATO - Formulário de Interesse </h1>
    </div>
    <br>
    <br>
    <table border="2" style="width: 50%; height: 100px;">
    <tbody>
            <tr>
                <td>
    <form action="processarFormphp" method="post">
        <label for="nome"> Nome: </label>
        <input type="text" id="nome" name="nome">
        <br>
        <br>
        <label for="email"> E-mail</label>
        <input type="email" id="email" name="email">
        <br>
        <br>
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone">
        <br>
        <br>
        <label for="Tipo de Pessoa">Tipo de Pessoa:</label>
        <select name="pessoa" size="1">
            <option value="">Selecione</option>
            <option value="cpf">Pessoa Física</option>
            <option value="cnpj">Pessoa Jurídica </option>
        </select>
        <br>
        <br>
        <label for="horário">Horário para Contato:</label>
        <input type="time" id="horário" name="horário">
        <br>
        <br>
        <label for="Serviço">Selecione o serviço desejado:</label>
        <br>
        <br>
        <input type="checkbox" id="estatica" name="estatica"> Página Estática
        <br>
        <input type="checkbox" id="dinamica" name="dinamica"> Página Dinâmica
        <br>
        <input type="checkbox" id="avancada" name="avancada"> Página Avançada
        <br>
        <br>
        <label for="Descrição Pedido"> Descrição Pedido</label>
        <br>
        <input type="text" style="width:80%; font-size: 12px; padding: 10px;" id="descricao" name="descricao">
        <br>
        <br>
        <label for="Receber contato">Receber Contato?</label>
        <input type="radio" id="opcao" name="opcao" value="yes"> Sim
        <input type="radio" id="opcao" name="opcao" value="no"> Não
        <br>
        <br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
</td>
    </tr>
    </tbody>
    </table>
    <style>
        .container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
    </style>

</body>

</html>
